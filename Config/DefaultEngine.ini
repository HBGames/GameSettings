;
; Plugin-shipped DefaultEngine ini. Currently scoped to property redirects
; that keep existing settings contribution assets valid across plugin renames.

[CoreRedirects]
; Renamed UGameSettingsRowContribution::ParentTab -> ParentContainer when
; sections were introduced. Assets saved before the rename still serialize
; "ParentTab" as the property name; this redirect re-routes them on load.
+PropertyRedirects=(OldName="/Script/GameSettings.GameSettingsRowContribution.ParentTab",NewName="/Script/GameSettings.GameSettingsRowContribution.ParentContainer")
