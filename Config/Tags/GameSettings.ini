;
; Tag table seed for the GameSettings plugin. The plugin owns these two
; root tags only. Contributors (game modules, GameFeaturePlugins,
; third-party plugins) define their own subtree under
; Settings.<Contributor>.* or, for shared tabs, Settings.Tab.<TabName>.
;
; See Docs/TAG_CONVENTIONS.md for the naming contract.

[/Script/GameplayTags.GameplayTagsList]
+GameplayTagList=(Tag="Settings",DevComment="Root for all GameSettings plugin tags. Do not register settings directly under this; use Settings.Tab.* and Settings.<Contributor>.*.")
+GameplayTagList=(Tag="Settings.Tab",DevComment="Root for top-level settings tabs. Common tabs (Settings.Tab.Audio, .Video, .Gameplay, etc.) are contributed by the project; plugin-specific tabs may live under Settings.Tab.<PluginName> if they need their own dedicated tab.")
